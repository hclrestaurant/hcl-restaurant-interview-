<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HCl Restaurant Booking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff7e5f, #feb47b);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 95%;
      max-width: 500px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
    }

    label {
      margin-top: 10px;
      display: block;
      font-weight: 500;
    }

    .required {
      color: red;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .error {
      color: red;
      font-size: 12px;
      display: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #ff7e5f;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    #successMsg {
      display: none;
      color: green;
      text-align: center;
      margin-top: 10px;
    }

    #otherCountry {
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>🍽️ HCl Restaurant Booking</h2>

  <!-- 🔥 FORM CONNECTED -->
  <form id="bookingForm" action="https://formspree.io/f/xbdplzjw" method="POST">

    <label>First Name <span class="required">*</span></label>
    <input type="text" name="first_name" id="firstName">

    <div class="error" id="firstNameError">Required</div>

    <label>Last Name <span class="required">*</span></label>
    <input type="text" name="last_name" id="lastName">
    <div class="error" id="lastNameError">Required</div>

    <label>Email <span class="required">*</span></label>
    <input type="email" name="email" id="email">
    <div class="error" id="emailError">Enter valid email</div>

    <label>Country <span class="required">*</span></label>
    <select name="country" id="country" onchange="checkCountry()">
      <option value="">Select</option>
      <option>🇵🇭 Philippines</option>
      <option>🇻🇳 Vietnam</option>
      <option>🇹🇷 Turkey</option>
      <option>🇫🇷 France</option>
      <option>🇮🇩 Indonesia</option>
      <option>🇨🇳 China</option>
      <option>🇵🇰 Pakistan</option>
      <option>🇮🇳 India</option>
      <option>🇮🇹 Italy</option>
      <option>🇹🇼 Taiwan</option>
      <option value="other">Other</option>
    </select>
    <div class="error" id="countryError">Required</div>

    <input type="text" name="other_country" id="otherCountry" placeholder="Enter country">

    <label>Date <span class="required">*</span></label>
    <input type="date" name="date" id="date">
    <div class="error" id="dateError">Required</div>

    <label>Time <span class="required">*</span></label>
    <input type="time" name="time" id="time">
    <div class="error" id="timeError">Required</div>

    <button type="submit">Book Now</button>

    <div id="successMsg">✅ Your booking request submitted!</div>

  </form>
</div>

<script>
function checkCountry() {
  let country = document.getElementById("country").value;
  let other = document.getElementById("otherCountry");

  if(country === "other"){
    other.style.display = "block";
  } else {
    other.style.display = "none";
  }
}

document.getElementById("bookingForm").addEventListener("submit", function(e){

  let valid = true;

  function error(id, condition){
    document.getElementById(id).style.display = condition ? "block" : "none";
    if(condition) valid = false;
  }

  error("firstNameError", !firstName.value);
  error("lastNameError", !lastName.value);
  error("emailError", !email.value.includes("@"));
  error("countryError", !country.value);
  error("dateError", !date.value);
  error("timeError", !time.value);

  if(!valid){
    e.preventDefault();
  } else {
    document.getElementById("successMsg").style.display = "block";
  }

});
</script>

</body>
      </html>
