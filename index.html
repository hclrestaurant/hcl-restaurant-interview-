<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HCl Restaurant Interview Booking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #ff512f, #dd2476, #24c6dc);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .container {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      width: 95%;
      max-width: 520px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    h1 {
      text-align: center;
      color: #dd2476;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #555;
      margin-bottom: 20px;
    }

    label {
      margin-top: 10px;
      display: block;
      font-weight: 500;
    }

    .required {
      color: red;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 10px;
      border: 1px solid #ccc;
      transition: 0.3s;
    }

    input:focus, select:focus {
      border-color: #dd2476;
      outline: none;
      box-shadow: 0 0 5px rgba(221,36,118,0.5);
    }

    .error {
      color: red;
      font-size: 12px;
      display: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 18px;
      background: linear-gradient(135deg, #ff512f, #dd2476);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    #successMsg {
      display: none;
      color: green;
      text-align: center;
      margin-top: 10px;
      font-weight: 500;
    }

    #otherCountry {
      display: none;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>🍽️ HCl Restaurant</h1>
  <div class="subtitle">Interview Booking Form – Please select your available time</div>

  <form id="bookingForm" action="https://formspree.io/f/xbdplzjw" method="POST">

    <label>First Name <span class="required">*</span></label>
    <input type="text" name="first_name" id="firstName">
    <div class="error" id="firstNameError">Required</div>

    <label>Last Name <span class="required">*</span></label>
    <input type="text" name="last_name" id="lastName">
    <div class="error" id="lastNameError">Required</div>

    <label>Email <span class="required">*</span></label>
    <input type="email" name="email" id="email">
    <div class="error" id="emailError">Enter valid email</div>

    <label>Country <span class="required">*</span></label>
    <select name="country" id="country" onchange="checkCountry()">
      <option value="">Select</option>
      <option>🇵🇭 Philippines</option>
      <option>🇻🇳 Vietnam</option>
      <option>🇹🇷 Turkey</option>
      <option>🇫🇷 France</option>
      <option>🇮🇩 Indonesia</option>
      <option>🇨🇳 China</option>
      <option>🇵🇰 Pakistan</option>
      <option>🇮🇳 India</option>
      <option>🇮🇹 Italy</option>
      <option>🇹🇼 Taiwan</option>
      <option value="other">Other</option>
    </select>
    <div class="error" id="countryError">Required</div>

    <input type="text" name="other_country" id="otherCountry" placeholder="Enter country">

    <label>Select Date <span class="required">*</span></label>
    <input type="date" name="date" id="date">
    <div class="error" id="dateError">Required</div>

    <label>Select Time <span class="required">*</span></label>
    <input type="time" name="time" id="time">
    <div class="error" id="timeError">Required</div>

    <button type="submit">📩 Book Interview</button>

    <div id="successMsg">✅ Your interview request has been submitted!</div>

  </form>

  <div class="footer">© 2026 HCl Restaurant</div>

</div>

<script>
function checkCountry() {
  let country = document.getElementById("country").value;
  let other = document.getElementById("otherCountry");

  if(country === "other"){
    other.style.display = "block";
  } else {
    other.style.display = "none";
  }
}

document.getElementById("bookingForm").addEventListener("submit", function(e){

  let valid = true;

  function error(id, condition){
    document.getElementById(id).style.display = condition ? "block" : "none";
    if(condition) valid = false;
  }

  error("firstNameError", !firstName.value);
  error("lastNameError", !lastName.value);
  error("emailError", !email.value.includes("@"));
  error("countryError", !country.value);
  error("dateError", !date.value);
  error("timeError", !time.value);

  if(!valid){
    e.preventDefault();
  } else {
    document.getElementById("successMsg").style.display = "block";
  }

});
</script>

</body>
    </html>
